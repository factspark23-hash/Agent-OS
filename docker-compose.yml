# Agent-OS Production Stack
# docker compose up -d
# docker compose logs -f agent-os
#
# REQUIRED: Set these environment variables before starting:
#   export POSTGRES_PASSWORD="<strong-password>"
#   export JWT_SECRET_KEY="<generate-with: python -c 'import secrets; print(secrets.token_urlsafe(48))'>"
#   export AGENT_TOKEN="<your-agent-token>"

services:
  # ─── PostgreSQL ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: agent-os-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agent_os
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD env var}
      POSTGRES_DB: agent_os
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_os -d agent_os"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ─── Redis ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agent-os-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M
          cpus: "0.5"

  # ─── Agent-OS ────────────────────────────────────────
  agent-os:
    build: .
    container_name: agent-os
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"   # WebSocket
      - "127.0.0.1:8001:8001"   # HTTP REST API
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?Set JWT_SECRET_KEY env var}
      - AGENT_TOKEN=${AGENT_TOKEN:-}
      - AGENT_OS_HOST=0.0.0.0
    volumes:
      - agent-os-data:/home/agentos/.agent-os
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    command: >
      --port 8000
      --database postgresql+asyncpg://agent_os:${POSTGRES_PASSWORD}@postgres:5432/agent_os
      --redis redis://redis:6379/0
      --json-logs
      --create-tables

  # ─── Nginx Reverse Proxy ─────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: agent-os-nginx
    restart: unless-stopped
    depends_on:
      - agent-os
    ports:
      - "0.0.0.0:443:443"
      - "0.0.0.0:80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro

volumes:
  postgres-data:
  redis-data:
  agent-os-data:
